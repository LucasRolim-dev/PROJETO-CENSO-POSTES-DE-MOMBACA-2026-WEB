version: '3.8'
services:
  web-censo:
    image: node:latest
    ports:
      - "3000:80"
    networks:
      - rede-publica
      - rede-privada
    environment:
      - DB_HOST=db-censo

  db-censo:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=censo_password_2026

networks:
  rede-publica:
    driver: bridge
  rede-privada:
    driver: bridge
    
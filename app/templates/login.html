<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Login | Censo Postes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #3b82f6; --primary-dark: #1d4ed8;
            --primary-glow: rgba(59,130,246,0.3);
            --bg: #0a0a0f; --card: #1a1a26; --border: #2a2a3a;
            --input-bg: #0f0f18; --text: #f0f0ff; --text-dim: #8888aa;
            --danger: #ef4444; --radius: 14px; --radius-sm: 8px;
        }
        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            padding: clamp(16px,4vw,40px);
            background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59,130,246,0.12), transparent 70%);
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: clamp(16px,3vw,24px); width: 100%; max-width: 420px;
            padding: clamp(28px,5vw,48px) clamp(22px,5vw,42px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            animation: fadeUp .4s ease both;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:none } }
        .logo {
            width: clamp(52px,8vw,68px); height: clamp(52px,8vw,68px);
            background: linear-gradient(135deg,rgba(59,130,246,.2),rgba(29,78,216,.1));
            border: 1px solid rgba(59,130,246,.3); border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(24px,4vw,32px); margin: 0 auto clamp(14px,3vw,20px);
        }
        h1 { font-family:'Syne',sans-serif; font-size:clamp(16px,3vw,20px); color:var(--primary); text-align:center; margin-bottom:6px; }
        .subtitle { font-size:clamp(11px,2vw,13px); color:var(--text-dim); text-align:center; margin-bottom:clamp(22px,4vw,32px); }
        .field { margin-bottom: 18px; }
        label { display:block; margin-bottom:7px; font-size:13px; font-weight:500; color:var(--text-dim); }
        .input-wrap { position: relative; }
        input {
            width:100%; padding: clamp(10px,2vw,13px) 44px clamp(10px,2vw,13px) clamp(12px,2.5vw,16px);
            border-radius:var(--radius-sm); border:1px solid var(--border);
            background:var(--input-bg); color:var(--text);
            font-family:'DM Sans',sans-serif; font-size:clamp(14px,2vw,15px);
            outline:none; transition:.25s; -webkit-appearance: none; -moz-appearance: none; appearance: none;
        }
        input:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-glow); }
        .input-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; }
        .btn {
            width:100%; padding:clamp(12px,2.5vw,15px); border-radius:var(--radius-sm); border:none;
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            color:#fff; font-family:'Syne',sans-serif; font-size:clamp(14px,2vw,16px); font-weight:700;
            cursor:pointer; margin-top:10px; transition:.2s;
            box-shadow:0 4px 20px rgba(59,130,246,.3);
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(59,130,246,.45); }
        .alert { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.4); color:#fca5a5;
            padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:18px; text-align:center; }
        .footer { text-align:center; margin-top:20px; font-size:11px; color:#444466; }
    </style>
</head>
<body>
  <div class="card">
    <div class="logo">💡</div>
    <h1>CENSO DE POSTES</h1>
    <p class="subtitle">Mombaça 2026 · Acesso Restrito</p>

    {% if erro %}
    <div class="alert">⚠️ {{ erro }}</div>
    {% endif %}

    <form method="POST" autocomplete="on">
      <div class="field">
        <label for="usuario">Usuário</label>
        <div class="input-wrap">
          <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário"
                 autocomplete="username" required autofocus>
          <span class="input-icon">👤</span>
        </div>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha"
                 autocomplete="current-password" required>
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <button type="submit" class="btn">Entrar →</button>
    </form>

    <p class="footer">Prefeitura Municipal de Mombaça · CE</p>
  </div>
</body>
</html>
